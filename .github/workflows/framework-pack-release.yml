name: Framework Pack Release Gate

on:
  workflow_dispatch:

jobs:
  require-reviewed-mappings:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt
      - name: Require reviewed framework mappings
        run: python -m frameworks.validate --active-only --require-reviewed --strict-sources
