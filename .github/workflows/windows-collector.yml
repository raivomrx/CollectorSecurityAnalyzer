name: Windows Collector

on:
  push:
  pull_request:

jobs:
  collector-contract:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt
      - name: Run Python tests
        run: python -W error::ResourceWarning -m unittest discover -s tests -v
      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -MinimumVersion 5.5.0 -Scope CurrentUser -Force -SkipPublisherCheck
      - name: Run collector tests
        shell: pwsh
        run: Invoke-Pester -Path tests/powershell -CI
