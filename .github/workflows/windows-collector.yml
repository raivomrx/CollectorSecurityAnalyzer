name: Windows Collector

on:
  push:
  pull_request:

jobs:
  collector-contract:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt
      - name: Run Python tests
        run: python -W error::ResourceWarning -m unittest discover -s tests -v
      - name: Validate privacy-safe collector sample
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path test-artifacts -Force | Out-Null
          Copy-Item tests/fixtures/canonical_windows_v2.json test-artifacts/mocked-collector-sample.json
          python -c "import json; from pathlib import Path; from collector_schema.validation import validate_v2_document; p=Path('test-artifacts/mocked-collector-sample.json'); warnings=validate_v2_document(json.loads(p.read_text(encoding='utf-8'))); Path('test-artifacts/schema-validation.json').write_text(json.dumps({'valid': True, 'warnings': warnings}, indent=2), encoding='utf-8')"
      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -MinimumVersion 5.5.0 -Scope CurrentUser -Force -SkipPublisherCheck
      - name: Run collector tests
        shell: pwsh
        run: |
          $result = Invoke-Pester -Path tests/powershell -CI -PassThru -OutputFormat NUnitXml -OutputFile test-artifacts/pester-results.xml
          if ($result.FailedCount -gt 0) { exit 1 }
      - name: Upload collector test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-collector-test-evidence
          path: test-artifacts/
